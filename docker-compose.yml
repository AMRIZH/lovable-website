services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lovable_recipe_share_hub_app
    ports:
      - "127.0.0.1:5173:5173"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
